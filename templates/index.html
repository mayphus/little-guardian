<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Baby Monitor</title>
  <style>
    :root {
      --bg-color: #09090b;
      --panel-bg: rgba(24, 24, 27, 0.8);
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --border-color: rgba(255, 255, 255, 0.1);
      --shadow-color: rgba(0, 0, 0, 0.5);
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 95%;
      max-width: 1400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 20px;
    }

    /* Video Player */
    .video-wrapper {
      width: 100%;
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
      background: #000;
      aspect-ratio: 16/9;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Control Bar */
    .control-bar {
      width: 100%;
      max-width: 800px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .control-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Buttons */
    .btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      width: 52px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 34px;
      border: 1px solid var(--border-color);
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: var(--accent-color);
      border-color: var(--accent-color);
    }

    input:checked+.slider:before {
      transform: translateX(24px);
    }

    /* Status Toast */
    .status-toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      padding: 10px 20px;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 500;
      color: white;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }

    .status-toast.visible {
      transform: translateX(-50%) translateY(0);
    }

    /* Mobile Optimization */
    @media (max-width: 768px) {
      .container {
        width: 100%;
        padding: 12px;
        gap: 16px;
      }

      .video-wrapper {
        border-radius: var(--radius-md);
      }

      .control-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 20px;
        padding: 20px;
      }

      .control-group {
        width: 100%;
        justify-content: space-between;
      }

      /* Center PTZ controls on mobile */
      .control-group:first-child {
        width: auto;
        justify-content: center;
      }

      .control-label {
        display: none;
        /* Hide labels to save space */
      }

      .btn {
        width: 40px;
        height: 40px;
        background: rgba(0, 0, 0, 0.3);
      }
    }

    /* Mobile Landscape Optimization */
    @media (max-height: 500px) and (orientation: landscape) {
      .container {
        width: 100vw;
        height: 100vh;
        padding: 0;
        margin: 0;
        gap: 0;
      }

      .video-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        z-index: 0;
      }

      .control-bar {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: auto;
        min-width: 300px;
        padding: 8px 16px;
        flex-direction: row;
        /* Keep horizontal in landscape */
        gap: 24px;
        background: rgba(24, 24, 27, 0.6);
        /* More transparent */
        backdrop-filter: blur(4px);
        z-index: 10;
        border-radius: 9999px;
        /* Pill shape */
      }

      .control-group {
        width: auto;
        justify-content: center;
      }

      .control-label {
        display: none;
        /* Hide labels to save space */
      }

      .btn {
        width: 40px;
        height: 40px;
        background: rgba(0, 0, 0, 0.3);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- Video Feed -->
    <div class="video-wrapper">
      <img id="video" src="/video.mjpg" alt="Live Stream">
    </div>

    <!-- Controls -->
    <div class="control-bar">
      <!-- PTZ -->
      <div class="control-group">
        <span class="control-label">Camera</span>
        <button class="btn" onclick="ptz('left')" title="Pan Left">
          <svg viewBox="0 0 24 24">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
          </svg>
        </button>
        <button class="btn" onclick="ptz('up')" title="Tilt Up">
          <svg viewBox="0 0 24 24">
            <path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z" />
          </svg>
        </button>
        <button class="btn" onclick="ptz('down')" title="Tilt Down">
          <svg viewBox="0 0 24 24">
            <path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z" />
          </svg>
        </button>
        <button class="btn" onclick="ptz('right')" title="Pan Right">
          <svg viewBox="0 0 24 24">
            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
          </svg>
        </button>
      </div>

      <!-- Tracking -->
      <div class="control-group">
        <span class="control-label">AI Tracking</span>
        <label class="toggle-switch">
          <input type="checkbox" id="trackingToggle" onchange="toggleTracking(this)">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="status-toast" id="status">Ready</div>

  <script>
    const statusEl = document.getElementById('status');
    let statusTimeout;

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.classList.add('visible');
      clearTimeout(statusTimeout);
      statusTimeout = setTimeout(() => {
        statusEl.classList.remove('visible');
      }, 2000);
    }

    async function ptz(action) {
      try {
        const res = await fetch('/ptz', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action })
        });
        const data = await res.json();
        if (data.ok) {
          showStatus(data.message || 'Moved ' + action);
        } else {
          showStatus('Error: ' + (data.message || 'Unknown'));
        }
      } catch (e) {
        showStatus('Network Error');
      }
    }

    async function toggleTracking(el) {
      const enable = el.checked;
      try {
        const res = await fetch('/tracking', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enable })
        });
        const data = await res.json();
        showStatus('Tracking ' + (data.enabled ? 'Enabled' : 'Disabled'));
        el.checked = data.enabled;
      } catch (e) {
        showStatus('Error toggling tracking');
        el.checked = !enable; // Revert
      }
    }

    // Init tracking state
    fetch('/tracking')
      .then(res => res.json())
      .then(data => {
        document.getElementById('trackingToggle').checked = data.enabled;
      })
      .catch(console.error);
  </script>
</body>

</html>
