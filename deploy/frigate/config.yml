# yaml-language-server: $schema=http://frigate_host:5000/api/config/schema.json
mqtt:
  enabled: false

tls:
  enabled: false

go2rtc:
  streams:
    baby_room:
      - rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_CAMERA_HOST}:554/stream1
    baby_room_sub:
      - rtsp://{FRIGATE_CAMERA_USER}:{FRIGATE_CAMERA_PASSWORD}@{FRIGATE_CAMERA_HOST}:554/stream2

detectors:
  cpu1:
    type: cpu

snapshots:
  enabled: true
  retain:
    default: 7

birdseye:
  enabled: true

cameras:
  baby_room:
    enabled: true
    detect:
      width: 640
      height: 360
      fps: 5
    objects:
      track:
        - person
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/baby_room_sub
          input_args: preset-rtsp-restream
          roles:
            - detect
        - path: rtsp://127.0.0.1:8554/baby_room
          input_args: preset-rtsp-restream
          roles:
            - record
